steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-east5-docker.pkg.dev/peopld-dev/peopld-backend/peopld-backend:$COMMIT_SHA'
      - '-t'
      - 'us-east5-docker.pkg.dev/peopld-dev/peopld-backend/peopld-backend:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-east5-docker.pkg.dev/peopld-dev/peopld-backend/peopld-backend'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'peopld-backend'
      - '--image'
      - 'us-east5-docker.pkg.dev/peopld-dev/peopld-backend/peopld-backend:$COMMIT_SHA'
      - '--region'
      - 'us-east5'
      - '--platform'
      - 'managed'

images:
  - 'us-east5-docker.pkg.dev/peopld-dev/peopld-backend/peopld-backend:$COMMIT_SHA'
  - 'us-east5-docker.pkg.dev/peopld-dev/peopld-backend/peopld-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
